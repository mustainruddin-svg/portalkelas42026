<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Kelas VI — SDIT Ar-Rahmah Sulawesi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#2E86C1; --sky-deep:#1B4F72; --sky-pale:#EAF4FC;
    --gold:#C9972F; --gold-pale:#FFF6E0;
    --white:#FFFFFF; --ink:#1E2A33; --ink-soft:#6B7A84; --line:#E7EEF3;
    --shadow:0 10px 26px rgba(27,79,114,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0; font-family:'Plus Jakarta Sans',sans-serif; color:var(--ink); background:var(--sky-pale);}
  body{padding-bottom:88px; -webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Fraunces',serif;}
  a{text-decoration:none; color:inherit;}
  img{max-width:100%; display:block;}
  button{font-family:inherit;}

  /* ---------- SHARED APP-LEVEL STATES ---------- */
  #page{min-height:60vh;}
  .app-loading{text-align:center; padding:80px 20px; color:var(--ink-soft);}
  .app-loading .spinner{width:28px; height:28px; border:3px solid var(--sky-pale); border-top-color:var(--sky); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .app-error{text-align:center; padding:60px 24px; color:#B23A3A;}
  .app-error button{margin-top:14px; background:var(--sky); color:#fff; border:none; padding:9px 18px; border-radius:999px; font-weight:700; font-size:12.5px; cursor:pointer;}

  /* ---------- SHARED BOTTOM TAB BAR ---------- */
  .tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    background:var(--white); border-top:1px solid var(--line);
    display:flex; justify-content:space-around; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    box-shadow:0 -6px 20px rgba(27,79,114,0.06);
  }
  .tab-item{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    color:var(--ink-soft); font-size:10.5px; font-weight:600; padding:5px 10px; border-radius:12px;
    transition:background .15s, color .15s; border:none; background:none; cursor:pointer;
  }
  .tab-item .t-icon{font-size:19px;}
  .tab-item.active{color:var(--sky-deep); background:var(--sky-pale);}
</style>
</head>
<body>

<div id="page">
  <div class="app-loading"><div class="spinner"></div>Memuat halaman…</div>
</div>

<nav class="tabbar" id="tabbar">
  <a class="tab-item" data-route="beranda" href="#/beranda"><span class="t-icon">🏠</span>Beranda</a>
  <a class="tab-item" data-route="kalender" href="#/kalender"><span class="t-icon">📅</span>Kalender</a>
  <a class="tab-item" data-route="budaya" href="#/budaya"><span class="t-icon">📚</span>Budaya</a>
  <a class="tab-item" data-route="galeri" href="#/galeri"><span class="t-icon">🖼️</span>Galeri</a>
  <a class="tab-item" data-route="aturan" href="#/aturan"><span class="t-icon">📋</span>Info</a>
  <a class="tab-item" data-route="panduan" href="#/panduan"><span class="t-icon">📖</span>Panduan</a>
</nav>

<script>
/* =========================================================
   ROUTER — Kelas VI SDIT Ar-Rahmah Sulawesi (Portal Terpadu)
   Semua halaman dimuat sebagai fragment ke dalam #page.
   Navigasi murni via hash (#/rute) sehingga tombol back/forward
   browser selalu berfungsi dan tidak ada lagi link "mati".
   ========================================================= */
(function(){
  var ROUTES = {
    beranda:  'pages/beranda.html',
    kalender: 'pages/kalender.html',
    budaya:   'pages/budaya.html',
    galeri:   'pages/galeri.html',
    aturan:   'pages/aturan.html',
    panduan:  'pages/panduan.html'
  };
  var DEFAULT_ROUTE = 'beranda';
  var pageEl = document.getElementById('page');
  var cache = {};

  function currentRoute(){
    var h = (location.hash || '').replace(/^#\/?/, '').split('?')[0];
    return ROUTES[h] ? h : DEFAULT_ROUTE;
  }

  function setActiveTab(route){
    document.querySelectorAll('#tabbar .tab-item').forEach(function(el){
      el.classList.toggle('active', el.dataset.route === route);
    });
  }

  function runPageScripts(container){
    var olds = container.querySelectorAll('script[data-page-script]');
    olds.forEach(function(old){
      var s = document.createElement('script');
      s.text = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
  }

  function loadRoute(route){
    setActiveTab(route);
    var url = ROUTES[route];

    var render = function(html){
      pageEl.innerHTML = html;
      runPageScripts(pageEl);
      window.scrollTo({top:0, behavior:'instant' in window ? 'instant' : 'auto'});
    };

    if (cache[route]){
      render(cache[route]);
      return;
    }

    pageEl.innerHTML = '<div class="app-loading"><div class="spinner"></div>Memuat halaman…</div>';
    fetch(url)
      .then(function(res){
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function(html){
        cache[route] = html;
        render(html);
      })
      .catch(function(err){
        pageEl.innerHTML =
          '<div class="app-error">Gagal memuat halaman ini.<br><small>' + err.message + '</small>' +
          '<br><button onclick="location.reload()">Coba Lagi</button></div>';
      });
  }

  window.addEventListener('hashchange', function(){ loadRoute(currentRoute()); });
  window.addEventListener('DOMContentLoaded', function(){ loadRoute(currentRoute()); });
})();
</script>

</body>
</html>
